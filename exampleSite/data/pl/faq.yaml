- question: "Czy muszę umówić się na wizytę?"
  answer: "Tak, zalecamy wcześniejszą rezerwację, ponieważ nasze terminy szybko się zapełniają. Możesz umówić się telefonicznie lub przez formularz na stronie. W nagłych przypadkach staramy się znaleźć wolny termin tego samego dnia."

- question: "Jak często powinien być strzyżony mój pies?"
  answer: "Częstotliwość strzyżenia zależy od rasy i typu sierści. Psy długowłose (np. Yorkshire Terrier, Maltańczyk) wymagają strzyżenia co 4-6 tygodni. Rasy z podszerstkiem (np. Golden Retriever) — co 8-12 tygodni. Podczas pierwszej wizyty doradzimy optymalny harmonogram dla Twojego pupila."

- question: "Czy mogę zostać podczas strzyżenia?"
  answer: "Ze względu na bezpieczeństwo i komfort zwierząt prosimy właścicieli o pozostanie w poczekalni lub o powrót na umówioną godzinę odbioru. Psy często zachowują się spokojniej, gdy nie widzą właściciela. W wyjątkowych przypadkach (szczenięta, psy lękliwe) możemy ustalić indywidualne zasady."

- question: "Ile trwa strzyżenie?"
  answer: "Czas zależy od wielkości psa, stanu sierści i zakresu usług. Orientacyjnie: mały pies — 1,5-2 godziny, średni — 2-2,5 godziny, duży — 2,5-3,5 godziny. Przy pierwszej wizycie lub mocno skołtunionej sierści czas może się wydłużyć."

- question: "Co obejmuje pełna pielęgnacja?"
  answer: "Pełna pielęgnacja to kompleksowy pakiet: kąpiel szamponem dobranym do typu sierści, suszenie, rozczesywanie, strzyżenie według życzenia, przycinanie pazurków, czyszczenie uszu, wyrównanie sierści wokół łapek i okolic intymnych. Na życzenie stosujemy także odżywki i perfumy."

- question: "Czy używacie naturalnych kosmetyków?"
  answer: "Tak, stawiamy na kosmetyki premium, które są łagodne i bezpieczne dla skóry zwierząt. Oferujemy szampony hypoalergiczne dla wrażliwych pupili oraz produkty organiczne na życzenie. Wszystkie produkty są testowane dermatologicznie."

- question: "Jak przygotować psa do wizyty?"
  answer: "Nie karm psa na 2 godziny przed wizytą (zapobieganie nudnościom). Wyprowadź go na spacer tuż przed przyjściem. Jeśli pies przyjmuje leki, poinformuj nas wcześniej. Przynieś książeczkę zdrowia przy pierwszej wizycie."

- question: "Czy przyjmujecie szczenięta?"
  answer: "Tak! Przyjmujemy szczenięta od 3-4 miesiąca życia, po zakończeniu szczepień podstawowych. Pierwsza wizyta jest wprowadzająca — oswajamy malucha z salonem, dźwiękami i narzędziami, bez pełnego strzyżenia. To ważne dla budowania pozytywnych skojarzeń z groomingiem."

- question: "Co jeśli mój pies ma kołtuny?"
  answer: "Lekkie kołtuny rozczesujemy delikatnie. W przypadku silnego skołtunienia może być konieczne krótkie strzyżenie maszynką — to jedyne humanitarne rozwiązanie, które nie sprawia bólu. Kołtuny uciskają skórę i mogą powodować podrażnienia, dlatego ich usunięcie jest priorytetem."

- question: "Czy strzyżycie koty?"
  answer: "Tak, obsługujemy również koty. Ze względu na ich specyficzny temperament wymagamy wcześniejszego kontaktu telefonicznego, aby omówić szczegóły. Kotom o wyjątkowo niespokojnym usposobieniu możemy zalecić wizytę u weterynarza z możliwością sedacji."

- question: "Jakie formy płatności akceptujecie?"
  answer: "Akceptujemy płatności gotówką, kartą (Visa, Mastercard) oraz BLIK. Płatność następuje po wykonaniu usługi. Oferujemy też pakiety i karnety na wizyty cykliczne z rabatem."

- question: "Co jeśli muszę odwołać wizytę?"
  answer: "Prosimy o odwołanie lub przełożenie wizyty minimum 24 godziny wcześniej. W przypadku późniejszego odwołania lub niestawienia się pobieramy opłatę w wysokości 50% ceny zarezerwowanej usługi. Rozumiemy jednak sytuacje losowe — skontaktuj się z nami."

- question: "Czy oferujecie usługi dla psów z problemami zdrowotnymi?"
  answer: "Tak, mamy doświadczenie w pracy z psami seniorami, po operacjach czy z problemami skórnymi. Prosimy o wcześniejszą informację o stanie zdrowia pupila. W niektórych przypadkach możemy wymagać zaświadczenia od weterynarza."

- question: "Czy macie parking?"
  answer: "Tak, dysponujemy bezpłatnym parkingiem dla klientów tuż przed salonem. Są również miejsca dla osób z niepełnosprawnościami. W godzinach szczytu parking może być zajęty — polecamy przyjazd 5 minut wcześniej."

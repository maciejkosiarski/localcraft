- name: "Maja Nowak"
  role: "Groomerka & Specjalistka od kotów"
  bio: "Dołączyłam do zespołu w 2020 roku. Ukończyłam certyfikat Cat Grooming Academy w Poznaniu (2019), gdzie opanowałam techniki pracy z kotami długo- i krótkowłosymi. Specjalizuję się w obsłudze zwierząt lękowych, stosując metody redukcji stresu zalecane przez Low Stress Handling® University. Pracuję głównie z rasami perskimi, brytyjskimi, maine coonami oraz psami ras małych."

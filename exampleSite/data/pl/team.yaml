  bio: "Z psami pracuję od 2010 roku. Ukończyłam Akademię Groomerską w Warszawie (2011), certyfikat European Pet Grooming Federation w Berlinie (2017) oraz specjalizację Show Grooming w Polish Grooming Academy w Krakowie (2019). Specjalizuję się w strzyżeniu pudli, yorków, shih tzu i maltańczyków. Regularnie uczestniczę w konkursach groomerskich w Polsce i Europie."

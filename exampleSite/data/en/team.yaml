- name: "Anna Kowalska"
  role: "Founder & Lead Groomer"
  bio: "I've been working with dogs since 2010. I graduated from the Grooming Academy in Warsaw (2011), earned a certificate from the European Pet Grooming Federation in Berlin (2017), and completed a Show Grooming specialization at Polish Grooming Academy in Krakow (2019). I specialize in grooming poodles, Yorkshire terriers, Shih Tzus, and Maltese dogs. I regularly compete in grooming competitions across Poland and Europe."

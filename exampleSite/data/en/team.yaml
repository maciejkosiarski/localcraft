- name: "Maja Nowak"
  role: "Groomer & Cat Specialist"
  bio: "I joined the team in 2020. I earned a Cat Grooming Academy certificate in Poznań (2019), where I mastered techniques for working with long- and short-haired cats. I specialize in handling anxious pets, using stress-reduction methods recommended by Low Stress Handling® University. I primarily work with Persian, British Shorthair, and Maine Coon cats, as well as small dog breeds."

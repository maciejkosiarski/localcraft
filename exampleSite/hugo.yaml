module:
  imports:
    - path: github.com/maciejkosiarski/localcraft

taxonomies:
  tag: tags
  category: categories

pagination:
  pagerSize: 6

params:
  review_url: "https://g.page/r/example/review"
  logo:
    name: "Snip Snip"
    dot: true
  # Google Tag Manager (optional) - uncomment and add your GTM ID
  # gtm:
  #   id: "GTM-XXXXXXX"
  # Custom colors (optional) - uncomment to override default theme colors
  # colors:
  #   primary: "#3B5C45"      # Main brand color (buttons, links, accents)
  #   primary_light: "#4A7257"
  #   primary_pale: "#E8F0EA"
  #   accent: "#C4714A"       # Secondary accent color (CTAs, highlights)
  #   accent_dark: "#B5633D"
  #   accent_pale: "#F5E6E0"
  #   background: "#FAF7F0"   # Page background color
  #   text: "#2D2D2D"         # Main text color
  #   text_muted: "#6B6B6B"   # Secondary text color
  # SEO & Business Info
  business:
    name: "Snip Snip"
    # Schema.org type: PetGroomer, HairSalon, BeautySalon, DaySpa, HealthAndBeautyBusiness
    type: "PetGroomer"
    phone: "+48 123 456 789"
    email: "kontakt@snipsnip.pl"
    street: "ul. Kwiatowa 15"
    city: "Warszawa"
    postalCode: "00-001"
    country: "PL"
    # Coordinates for map and JSON-LD
    lat: 52.2297
    lng: 21.0122
    start_year: 2018
    # Customer ratings (optional) - for AggregateRating schema
    rating:
      value: 4.9
      count: 127
      best: 5
    # Key Facts section (optional)
    specialties:
      - "Long-haired dog grooming"
      - "Show grooming"
      - "Breed-specific cuts"
    parking: "Free parking + disabled spaces available"
    payment_methods:
      - "Cash"
      - "Card"
      - "BLIK"
    languages:
      - "Polish"
      - "English"
  # Opening hours for Key Facts section (optional)
  opening_hours: "Mon-Fri 9:00-18:00, Sat 10:00-16:00"
  # Open Graph image
  og_image: "/images/og-default.jpg"
  # Floating support button (Buy Me a Coffee, Ko-fi, etc.)
  # Text is loaded from i18n files (support_title, support_description, support_button)
  support_button:
    enabled: true
    url: "https://buymeacoffee.com/maciejkosiarski"
    qr_image: "/images/bmc-qr-code.png"
  # Image optimization settings
  images:
    quality: 80                    # Image quality (1-100). Recommendations: 60-70 (size), 80 (balanced), 90-95 (quality)
    widths: [400, 800, 1200, 1600] # Responsive image widths in pixels
    lazy_loading: true             # Enable lazy loading by default

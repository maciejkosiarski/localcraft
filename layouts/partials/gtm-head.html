{{/*
  Google Tag Manager - Head Script

  Loads GTM only when:
  1. GTM ID is configured in site.Params.gtm.id
  2. User has given consent (cookie_consent=accepted)

  Usage: Add {{ partial "gtm-head.html" . }} in <head>
*/}}
{{- with site.Params.gtm.id -}}
<!-- Google Tag Manager -->
<script>
(function(w,d,s,l,i){
  // Check for consent before loading GTM
  var consent = document.cookie.match(/cookie_consent=([^;]+)/);
  if (consent && consent[1] === 'accepted') {
    w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  }
})(window,document,'script','dataLayer','{{ . }}');
</script>
<!-- End Google Tag Manager -->
{{- end -}}

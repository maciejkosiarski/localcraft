{{ define "main" }}
<section class="section">
  <div class="container">
    <header class="section__header">
      {{ with .Params.label }}
        <span class="section-label">{{ . }}</span>
      {{ end }}
      <h1 class="section-heading">{{ .Title }}</h1>
      {{ with .Params.description }}
        <p class="section-sub">{{ . }}</p>
      {{ end }}
    </header>

    {{ with .Content }}
      <div class="prose">
        {{ . }}
      </div>
    {{ end }}

    {{ range .Pages }}
      <article>
        <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
        {{ .Summary }}
      </article>
    {{ end }}
  </div>
</section>
{{ end }}

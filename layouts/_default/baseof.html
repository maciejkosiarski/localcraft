<!DOCTYPE html>
<html lang="{{ .Language.Lang }}">
<head>
  {{ partial "head.html" . }}
  {{ block "head" . }}{{ end }}
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  {{ partial "nav.html" . }}

  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  {{- $navJs := resources.Get "js/nav.js" | minify | fingerprint -}}
  {{- with $navJs -}}
    <script src="{{ .RelPermalink }}" defer integrity="{{ .Data.Integrity }}"></script>
  {{- end -}}

  {{ block "scripts" . }}{{ end }}
</body>
</html>

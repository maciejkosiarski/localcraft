<!DOCTYPE html>
<html lang="{{ .Language.Lang }}">
<head>
  {{ partial "head.html" . }}
  {{ block "head" . }}{{ end }}
</head>
<body>
  {{ partial "nav.html" . }}

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  {{- $navJs := resources.Get "js/nav.js" -}}
  {{- if $navJs -}}
    {{- $navJs = $navJs | minify | fingerprint -}}
    <script src="{{ $navJs.RelPermalink }}" defer></script>
  {{- end -}}

  {{ block "scripts" . }}{{ end }}
</body>
</html>
